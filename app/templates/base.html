<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Реєстратура клініки{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-hospital me-2"></i>Реєстратура клініки
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/patients/">
                        <i class="bi bi-people me-1"></i>Пацієнти
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/doctors/">
                        <i class="bi bi-person-badge me-1"></i>Лікарі
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/appointments/">
                        <i class="bi bi-calendar-check me-1"></i>Прийоми
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4 mb-5">
    {% block content %}{% endblock %}
</div>

<footer class="py-3 bg-light border-top mt-auto">
    <div class="container text-center text-muted small">
        Реєстратура клініки &copy; 2024 &nbsp;|&nbsp; Лабораторна робота №3 &nbsp;|&nbsp; Група IR-31
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
