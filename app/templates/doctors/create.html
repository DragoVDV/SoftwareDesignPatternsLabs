{% extends "base.html" %}
{% block title %}Додати лікаря — Реєстратура{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/doctors/">Лікарі</a></li>
                <li class="breadcrumb-item active">Додати лікаря</li>
            </ol>
        </nav>

        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-person-plus me-2"></i>Новий лікар</h5>
            </div>
            <div class="card-body">
                <form method="post" action="/doctors/create">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Ім'я <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="first_name" required placeholder="Олександр">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Прізвище <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="last_name" required placeholder="Петренко">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Спеціалізація <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="specialization" required
                               placeholder="Терапевт, Кардіолог, Хірург...">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Телефон</label>
                        <input type="tel" class="form-control" name="phone" placeholder="+380501234567">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-check-lg me-1"></i>Зберегти
                        </button>
                        <a href="/doctors/" class="btn btn-outline-secondary">Скасувати</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
