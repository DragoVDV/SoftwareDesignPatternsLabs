version: "3.7"
services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: dev-user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dev_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - 5434:5432
    expose:
      - "5432"
    volumes:
      - db-data:/var/lib/postgresql/data:cached
volumes:
  db-data:
  
